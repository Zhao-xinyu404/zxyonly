<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>无聊 Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --brand:#07c160;
    --brand-dark:#06ad56;
    --brand-light:#e9f7ef;
    --bg:#ededed;
    --bg-2:#f7f7f7;
    --card:#ffffff;
    --text:#191919;
    --text-2:#888888;
    --text-3:#b2b2b2;
    --border:#e5e5e5;
    --line:#f0f0f0;
    --danger:#fa5151;
    --warn:#ffc300;
    --bubble-self:#95ec69;
    --shadow:0 8px 32px rgba(0,0,0,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:linear-gradient(135deg,#d8e4d8 0%,#e8eee8 50%,#d8e4d8 100%);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:0;
    overflow:hidden;
  }
  /* 手机外框 —— 桌面端居中显示 */
  .phone{
    position:relative;
    width:100%;
    max-width:430px;
    height:100vh;
    max-height:932px;
    background:var(--bg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,0.25), 0 0 0 8px #1a1a1a, 0 0 0 10px #2a2a2a;
    border-radius:42px;
  }
  /* 桌面端：当窗口高度不足以容纳手机外框时，去掉外壳限制，让内容撑满并保证底部 Tab 可见 */
  @media(min-width:481px) and (max-height:960px){
    .phone{
      max-height:100vh;
      border-radius:0;
      box-shadow:none;
    }
    body{background:var(--bg);align-items:stretch;}
  }
  @media(max-width:480px){
    body{background:var(--bg);}
    .phone{box-shadow:none;border-radius:0;max-width:100%;max-height:100vh;}
  }
  /* 滚动条隐藏 */
  .phone ::-webkit-scrollbar{width:0;display:none;}

  /* ===== 登录/注册页 ===== */
  #auth-view{
    flex:1;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,#ffffff 0%,#f3f7f3 100%);
    overflow-y:auto;
  }
  .auth-header{
    padding:60px 30px 30px;
    text-align:center;
  }
  .auth-logo{
    width:88px;height:88px;
    margin:0 auto 18px;
    background:linear-gradient(135deg,var(--brand) 0%,#34d27f 100%);
    border-radius:22px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 30px rgba(7,193,96,0.35);
    color:#fff;font-size:42px;
    transform:rotate(-6deg);
    transition:transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .auth-logo:hover{transform:rotate(0deg) scale(1.05);}
  .auth-header h1{font-size:28px;letter-spacing:1px;margin-bottom:6px;}
  .auth-header p{color:var(--text-2);font-size:14px;}

  .auth-form{
    padding:20px 30px 40px;
    display:flex;flex-direction:column;gap:14px;
  }
  .field{
    position:relative;
    background:#fff;
    border-radius:14px;
    border:1.5px solid var(--border);
    transition:border-color .25s;
  }
  .field:focus-within{border-color:var(--brand);}
  .field label{
    position:absolute;
    left:16px;top:50%;
    transform:translateY(-50%);
    color:var(--text-3);
    font-size:13px;
    pointer-events:none;
    transition:all .2s;
  }
  .field input{
    width:100%;
    border:none;outline:none;
    background:transparent;
    padding:18px 16px 8px;
    font-size:16px;
    color:var(--text);
  }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label{
    top:8px;transform:translateY(0);
    font-size:11px;color:var(--brand);
  }
  .field.has-icon input{padding-left:48px;}
  .field .icon{
    position:absolute;left:18px;top:50%;transform:translateY(-50%);
    color:var(--text-3);font-size:16px;
  }

  .avatar-pick{
    display:flex;gap:10px;flex-wrap:wrap;
    padding:6px 0 4px;
  }
  .avatar-pick .av{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;font-weight:600;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .2s, border-color .2s;
  }
  .avatar-pick .av:hover{transform:scale(1.08);}
  .avatar-pick .av.active{border-color:var(--brand);transform:scale(1.08);}

  .btn-primary{
    background:var(--brand);
    color:#fff;border:none;
    padding:16px;border-radius:14px;
    font-size:16px;font-weight:500;
    cursor:pointer;
    transition:background .2s, transform .1s;
    margin-top:6px;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-primary:disabled{background:#9ed8b6;cursor:not-allowed;}

  .auth-switch{
    text-align:center;
    color:var(--text-2);
    font-size:13px;
    margin-top:8px;
  }
  .auth-switch a{
    color:var(--brand);
    text-decoration:none;
    font-weight:500;
  }
  .auth-tip{
    margin-top:24px;
    padding:14px 16px;
    background:var(--brand-light);
    border-radius:12px;
    font-size:12px;
    color:var(--brand-dark);
    line-height:1.6;
  }
  .auth-error{
    color:var(--danger);
    font-size:12px;
    text-align:center;
    min-height:16px;
    margin-top:-4px;
  }

  /* ===== 主视图 ===== */
  #main-view{
    flex:1;
    display:none;
    flex-direction:column;
    overflow:hidden;
    background:var(--bg);
  }
  #main-view.show{display:flex;}

  /* 顶部 Header */
  .nav-header{
    flex-shrink:0;
    background:#ededed;
    padding:32px 16px 10px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  .nav-header h2{
    font-size:17px;font-weight:600;
    flex:1;text-align:center;
  }
  .nav-header .icon-btn{
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:20px;
    background:transparent;border:none;cursor:pointer;
    border-radius:8px;
    transition:background .2s;
  }
  .nav-header .icon-btn:hover{background:rgba(0,0,0,0.05);}

  /* Tab 内容区 */
  .tab-panels{
    flex:1;
    overflow-y:auto;
    position:relative;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* 通用列表 */
  .list-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;
    background:#fff;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    transition:background .15s;
  }
  .list-row:hover{background:#f5f5f5;}
  .list-row:active{background:#ebebeb;}
  .list-row .avatar{
    width:46px;height:46px;border-radius:8px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;font-weight:600;
    position:relative;
  }
  .list-row .info{flex:1;min-width:0;}
  .list-row .info .name{
    font-size:16px;font-weight:500;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .list-row .info .desc{
    font-size:13px;color:var(--text-2);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    margin-top:2px;
  }
  .list-row .meta{
    font-size:11px;color:var(--text-3);
    flex-shrink:0;
    text-align:right;
  }
  .badge{
    display:inline-block;
    background:var(--danger);color:#fff;
    font-size:11px;font-weight:600;
    min-width:18px;height:18px;
    border-radius:9px;
    padding:0 5px;
    line-height:18px;
    text-align:center;
    margin-top:4px;
  }

  /* 无聊 Tab */
  .chat-search{
    padding:8px 12px;
    background:#ededed;
    position:sticky;top:0;z-index:2;
  }
  .chat-search .box{
    background:rgba(255,255,255,0.9);
    border-radius:8px;
    padding:8px 12px;
    text-align:center;
    font-size:13px;color:var(--text-2);
  }
  .chat-list .list-row .info .desc{color:var(--text-2);}
  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-3);
  }
  .empty-state i{font-size:48px;margin-bottom:14px;color:var(--text-3);opacity:.5;}
  .empty-state p{font-size:14px;}

  /* 通讯录 Tab */
  .contacts-header-card{
    background:#fff;
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .contacts-header-card:hover{background:#f5f5f5;}
  .contacts-header-card .ic{
    width:36px;height:36px;border-radius:8px;
    background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .contacts-section-title{
    background:#ededed;color:var(--text-2);
    padding:6px 16px;font-size:12px;
  }

  /* 发现 Tab */
  .discover-list .list-row .avatar{background:transparent;}
  .discover-list .list-row .avatar i{font-size:20px;}
  .discover-banner{
    background:linear-gradient(135deg,#07c160 0%,#34d27f 100%);
    color:#fff;
    padding:24px 18px;margin:12px;
    border-radius:14px;
    display:flex;align-items:center;gap:14px;
    box-shadow:0 8px 22px rgba(7,193,96,0.3);
  }
  .discover-banner i{font-size:32px;}
  .discover-banner div h4{font-size:16px;font-weight:600;}
  .discover-banner div p{font-size:12px;opacity:.85;margin-top:2px;}

  /* 我 Tab */
  .profile-card{
    background:#fff;
    padding:24px 16px;
    display:flex;align-items:center;gap:16px;
    border-bottom:1px solid var(--line);
  }
  .profile-card .avatar{
    width:64px;height:64px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:26px;font-weight:600;
  }
  .profile-card .info h3{font-size:19px;font-weight:600;}
  .profile-card .info .wxid{font-size:13px;color:var(--text-2);margin-top:4px;}
  .profile-card .info .bio{font-size:12px;color:var(--text-3);margin-top:6px;}
  .profile-card .qr{color:var(--text-3);font-size:18px;}

  .profile-menu{margin-top:10px;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .profile-menu .list-row .arrow{color:var(--text-3);font-size:14px;}
  .profile-menu .list-row .avatar{width:24px;height:24px;border-radius:6px;font-size:14px;}

  /* 底部 Tab Bar */
  .tab-bar{
    flex-shrink:0;
    background:#f7f7f7;
    border-top:1px solid var(--border);
    display:flex;
    padding:6px 0 14px;
  }
  .tab-bar .tab{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--text-2);font-size:11px;
    cursor:pointer;
    gap:3px;
    transition:color .2s;
  }
  .tab-bar .tab i{font-size:22px;}
  .tab-bar .tab.active{color:var(--brand);}

  /* ===== 聊天详情页 ===== */
  #chat-detail-view{
    position:absolute;
    inset:0;
    background:var(--bg);
    display:none;
    flex-direction:column;
    z-index:50;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  #chat-detail-view.show{
    display:flex;
    transform:translateX(0);
  }
  .chat-detail-header{
    flex-shrink:0;
    background:#ededed;
    padding:30px 8px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--border);
  }
  .chat-detail-header .icon-btn{
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:20px;background:none;border:none;cursor:pointer;
    border-radius:8px;
  }
  .chat-detail-header .icon-btn:hover{background:rgba(0,0,0,0.05);}
  .chat-detail-header h3{
    flex:1;text-align:center;font-size:17px;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;
  }

  .chat-messages{
    flex:1;
    overflow-y:auto;
    padding:14px 12px 20px;
    display:flex;flex-direction:column;gap:14px;
  }
  .msg-time{
    text-align:center;font-size:11px;color:var(--text-2);
    margin:8px 0;
  }
  .msg{
    display:flex;gap:8px;align-items:flex-start;
    max-width:100%;
    animation:msgIn .25s ease;
  }
  @keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .msg .avatar{
    width:38px;height:38px;border-radius:6px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:15px;font-weight:600;
  }
  .msg .bubble{
    max-width:64%;
    padding:10px 12px;
    border-radius:6px;
    font-size:15px;
    line-height:1.45;
    word-break:break-word;
    position:relative;
    box-shadow:0 1px 1px rgba(0,0,0,0.04);
  }
  .msg.other .bubble{background:#fff;color:var(--text);}
  .msg.other .bubble::before{
    content:"";position:absolute;left:-6px;top:12px;
    border:6px solid transparent;border-right-color:#fff;
  }
  .msg.self{flex-direction:row-reverse;}
  .msg.self .bubble{background:var(--bubble-self);color:var(--text);}
  .msg.self .bubble::before{
    content:"";position:absolute;right:-6px;top:12px;
    border:6px solid transparent;border-left-color:var(--bubble-self);
  }

  .chat-input-bar{
    flex-shrink:0;
    background:#f7f7f7;
    border-top:1px solid var(--border);
    padding:8px 10px 14px;
    display:flex;align-items:flex-end;gap:8px;
  }
  .chat-input-bar .icon-btn{
    width:34px;height:34px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#444;font-size:22px;background:none;border:none;cursor:pointer;
  }
  .chat-input-bar textarea{
    flex:1;
    min-height:36px;max-height:100px;
    border:none;outline:none;
    border-radius:6px;
    padding:8px 10px;
    font-size:15px;
    font-family:inherit;
    resize:none;
    background:#fff;
    line-height:1.4;
  }
  .chat-input-bar .send-btn{
    background:var(--brand);color:#fff;
    border:none;
    padding:0 16px;height:36px;
    border-radius:6px;
    font-size:14px;font-weight:500;
    cursor:pointer;
    flex-shrink:0;
    transition:background .2s;
  }
  .chat-input-bar .send-btn:hover{background:var(--brand-dark);}
  .chat-input-bar .send-btn:disabled{background:#9ed8b6;}

  /* ===== 模态框 ===== */
  .modal-mask{
    position:absolute;inset:0;
    background:rgba(0,0,0,0.45);
    z-index:100;
    display:none;
    align-items:center;justify-content:center;
    animation:fadeIn .2s ease;
  }
  .modal-mask.show{display:flex;}
  .modal{
    width:80%;max-width:320px;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    animation:scaleIn .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
  .modal-header{
    padding:18px 18px 12px;text-align:center;
    font-size:16px;font-weight:600;
  }
  .modal-body{padding:0 18px 16px;}
  .modal-body input{
    width:100%;
    border:1.5px solid var(--border);border-radius:8px;
    padding:12px;font-size:15px;outline:none;
    transition:border-color .2s;
  }
  .modal-body input:focus{border-color:var(--brand);}
  .modal-body .hint{font-size:12px;color:var(--text-2);margin-top:8px;line-height:1.5;}
  .modal-footer{
    display:flex;border-top:1px solid var(--line);
  }
  .modal-footer button{
    flex:1;background:none;border:none;padding:14px 0;
    font-size:16px;cursor:pointer;
  }
  .modal-footer button:hover{background:#f5f5f5;}
  .modal-footer .confirm{color:var(--brand);font-weight:600;border-left:1px solid var(--line);}
  .modal-footer .confirm.danger{color:var(--danger);}

  /* Toast */
  .toast{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.78);
    color:#fff;
    padding:12px 20px;
    border-radius:10px;
    font-size:14px;
    z-index:200;
    pointer-events:none;
    opacity:0;
    transition:opacity .25s;
    max-width:80%;
    text-align:center;
  }
  .toast.show{opacity:1;}

  /* 预设头像颜色 */
  .av-1{background:linear-gradient(135deg,#07c160,#34d27f);}
  .av-2{background:linear-gradient(135deg,#3b82f6,#60a5fa);}
  .av-3{background:linear-gradient(135deg,#f59e0b,#fbbf24);}
  .av-4{background:linear-gradient(135deg,#ef4444,#f87171);}
  .av-5{background:linear-gradient(135deg,#8b5cf6,#a78bfa);}
  .av-6{background:linear-gradient(135deg,#ec4899,#f472b6);}
  .av-7{background:linear-gradient(135deg,#14b8a6,#5eead4);}
  .av-8{background:linear-gradient(135deg,#64748b,#94a3b8);}
</style>
</head>
<body>

<div class="phone">

  <!-- ============ 登录/注册 ============ -->
  <div id="auth-view">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-comment-dots"></i></div>
      <h1>无聊</h1>
      <p>无聊 · 即时通讯 简化版</p>
    </div>

    <div class="auth-form">
      <!-- 登录表单 -->
      <div id="login-form">
        <div class="field has-icon">
          <input type="text" id="login-username" placeholder=" " autocomplete="off">
          <i class="icon fas fa-user"></i>
          <label>用户名</label>
        </div>
        <div class="field has-icon">
          <input type="password" id="login-password" placeholder=" " autocomplete="off">
          <i class="icon fas fa-lock"></i>
          <label>密码</label>
        </div>
        <div class="auth-error" id="login-error"></div>
        <button class="btn-primary" id="btn-login">登 录</button>
        <div class="auth-switch">还没有账号？<a id="goto-register">立即注册</a></div>
      </div>

      <!-- 注册表单 -->
      <div id="register-form" style="display:none;">
        <div class="field has-icon">
          <input type="text" id="reg-username" placeholder=" " autocomplete="off">
          <i class="icon fas fa-user"></i>
          <label>用户名（用于登录/加好友）</label>
        </div>
        <div class="field has-icon">
          <input type="password" id="reg-password" placeholder=" " autocomplete="off">
          <i class="icon fas fa-lock"></i>
          <label>密码</label>
        </div>
        <div class="field has-icon">
          <input type="text" id="reg-nickname" placeholder=" " autocomplete="off">
          <i class="icon fas fa-smile"></i>
          <label>昵称</label>
        </div>
        <div>
          <div style="font-size:12px;color:var(--text-2);margin:8px 4px;">选择头像</div>
          <div class="avatar-pick" id="avatar-pick">
            <div class="av av-1 active" data-av="1"><i class="fas fa-cat"></i></div>
            <div class="av av-2" data-av="2"><i class="fas fa-dog"></i></div>
            <div class="av av-3" data-av="3"><i class="fas fa-fish"></i></div>
            <div class="av av-4" data-av="4"><i class="fas fa-dragon"></i></div>
            <div class="av av-5" data-av="5"><i class="fas fa-otter"></i></div>
            <div class="av av-6" data-av="6"><i class="fas fa-kiwi-bird"></i></div>
            <div class="av av-7" data-av="7"><i class="fas fa-horse"></i></div>
            <div class="av av-8" data-av="8"><i class="fas fa-paw"></i></div>
          </div>
        </div>
        <div class="auth-error" id="reg-error"></div>
        <button class="btn-primary" id="btn-register">注 册 并 登 录</button>
        <div class="auth-switch">已有账号？<a id="goto-login">返回登录</a></div>
      </div>

      <div class="auth-tip">
        <strong>提示：</strong>这是一个纯前端 Demo，所有数据保存在浏览器本地（localStorage）。可注册多个账号互相加好友聊天（同一浏览器内）。
      </div>
    </div>

<script>
/* ============ 数据层 ============ */
const Store = {
  USERS_KEY:'weichat_users',
  SESSION_KEY:'weichat_session',
  usersKey(){return this.USERS_KEY;},
  getUsers(){
    try{return JSON.parse(localStorage.getItem(this.USERS_KEY))||[];}catch(e){return [];}
  },
  saveUsers(arr){localStorage.setItem(this.USERS_KEY,JSON.stringify(arr));},
  findUser(username){return this.getUsers().find(u=>u.username===username);},
  addUser(user){
    const arr=this.getUsers();
    arr.push(user);this.saveUsers(arr);
  },
  updateUser(username,patch){
    const arr=this.getUsers();
    const i=arr.findIndex(u=>u.username===username);
    if(i>=0){arr[i]={...arr[i],...patch};this.saveUsers(arr);return arr[i];}
    return null;
  },
  setSession(username){localStorage.setItem(this.SESSION_KEY,username);},
  getSession(){return localStorage.getItem(this.SESSION_KEY);},
  clearSession(){localStorage.removeItem(this.SESSION_KEY);},
  friendsKey(u){return 'weichat_friends_'+u;},
  getFriends(u){
    try{return JSON.parse(localStorage.getItem(this.friendsKey(u)))||[];}catch(e){return [];}
  },
  saveFriends(u,arr){localStorage.setItem(this.friendsKey(u),JSON.stringify(arr));},
  addFriend(a,b){
    // 双向添加
    const fa=this.getFriends(a);
    if(!fa.includes(b)){fa.push(b);this.saveFriends(a,fa);}
    const fb=this.getFriends(b);
    if(!fb.includes(a)){fb.push(a);this.saveFriends(b,fb);}
  },
  isFriend(a,b){return this.getFriends(a).includes(b);},
  msgKey(a,b){
    // 按字典序
    return [a,b].sort().join('__');
  },
  getMsgs(a,b){
    try{return JSON.parse(localStorage.getItem('weichat_msgs_'+this.msgKey(a,b)))||[];}catch(e){return [];}
  },
  saveMsgs(a,b,arr){localStorage.setItem('weichat_msgs_'+this.msgKey(a,b),JSON.stringify(arr));},
  addMsg(from,to,content){
    const arr=this.getMsgs(from,to);
    arr.push({from,to,content,time:Date.now()});
    this.saveMsgs(from,to,arr);
  },
  unreadKey(u){return 'weichat_unread_'+u;},
  getUnread(u){
    try{return JSON.parse(localStorage.getItem(this.unreadKey(u)))||{};}catch(e){return {};}
  },
  saveUnread(u,obj){localStorage.setItem(this.unreadKey(u),JSON.stringify(obj));},
  addUnread(u,from){
    const o=this.getUnread(u);
    o[from]=(o[from]||0)+1;
    this.saveUnread(u,o);
  },
  clearUnread(u,from){
    const o=this.getUnread(u);
    delete o[from];
    this.saveUnread(u,o);
  }
};

/* ============ 头像渲染 ============ */
const AV_ICONS={1:'cat',2:'dog',3:'fish',4:'dragon',5:'otter',6:'kiwi-bird',7:'horse',8:'paw'};
function avatarHTML(av,text){
  const icon=AV_ICONS[av]||'paw';
  if(text){
    return `<div class="avatar av-${av||1}">${text.charAt(0).toUpperCase()}</div>`;
  }
  return `<div class="avatar av-${av||1}"><i class="fas fa-${icon}"></i></div>`;
}
function userAvatarHTML(user,text){
  if(!user) return avatarHTML(1,'?');
  const icon=AV_ICONS[user.avatar]||'paw';
  if(text){
    return `<div class="avatar av-${user.avatar||1}">${text.charAt(0).toUpperCase()}</div>`;
  }
  return `<div class="avatar av-${user.avatar||1}"><i class="fas fa-${icon}"></i></div>`;
}

/* ============ UI 辅助 ============ */
const $ = id => document.getElementById(id);
function toast(msg,duration=1800){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),duration);
}

let confirmCallback=null;
function showConfirm(msg,onOk,title='提示'){
  $('confirm-title').textContent=title;
  $('confirm-msg').textContent=msg;
  $('confirm-modal').classList.add('show');
  confirmCallback=onOk;
}
$('confirm-cancel').onclick=()=>$('confirm-modal').classList.remove('show');
$('confirm-ok').onclick=()=>{
  $('confirm-modal').classList.remove('show');
  if(confirmCallback){confirmCallback();confirmCallback=null;}
};

$('btn-register').onclick=()=>{
  const username=$('reg-username').value.trim();
  const password=$('reg-password').value;
  const nickname=$('reg-nickname').value.trim();
  if(!username||!password||!nickname){
    $('reg-error').textContent='请填写完整信息';return;
  }
  if(username.length<3){$('reg-error').textContent='用户名至少3个字符';return;}
  if(password.length<4){$('reg-error').textContent='密码至少4位';return;}
  if(Store.findUser(username)){

  currentUser=newUser;
  $('reg-error').textContent='';

/* ============ Tab 切换 ============ */

/* ============ 渲染：聊天列表 ============ */
function renderChatList(){
  const list=$('chat-list');
  const friends=Store.getFriends(currentUser.username);
  if(friends.length===0){
    list.innerHTML=`<div class="empty-state">
      <i class="fas fa-comments"></i>
      <p>还没有会话<br>去通讯录添加好友开始聊天吧</p>
    </div>`;
    return;
  }
  // 构建会话列表
  const sessions=friends.map(f=>{
    const msgs=Store.getMsgs(currentUser.username,f);
    const last=msgs[msgs.length-1];
    const unread=Store.getUnread(currentUser.username)[f]||0;
    return {
      username:f,
      user:Store.findUser(f),
      lastMsg:last?last.content:'',
      lastTime:last?last.time:0,
      unread
    };
  }).sort((a,b)=>b.lastTime-a.lastTime);

  list.innerHTML=sessions.map(s=>{
    if(!s.user) return '';
    const timeStr=s.lastTime?formatChatTime(s.lastTime):'';
    const unreadBadge=s.unread>0?`<span class="badge">${s.unread>99?'99+':s.unread}</span>`:'';
    return `<div class="list-row" data-friend="${s.username}">
      ${userAvatarHTML(s.user,s.user.nickname)}
      <div class="info">
        <div class="name">${escapeHTML(s.user.nickname)}</div>
        <div class="desc">${s.lastMsg?escapeHTML(s.lastMsg):'开始聊天吧 →'}</div>
      </div>
      <div class="meta">
        <div>${timeStr}</div>
        ${unreadBadge}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.list-row').forEach(row=>{
    row.onclick=()=>openChat(row.dataset.friend);
  });
}

function formatChatTime(t){
  const d=new Date(t);
  const now=new Date();
  if(d.toDateString()===now.toDateString()){
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  const yest=new Date(now);yest.setDate(now.getDate()-1);
  if(d.toDateString()===yest.toDateString()) return '昨天';
  return (d.getMonth()+1)+'/'+d.getDate();
}

/* ============ 渲染：通讯录 ============ */
function renderContacts(){
  const list=$('contacts-list');
  const friends=Store.getFriends(currentUser.username);
  $('contacts-count').textContent='好友 ('+friends.length+')';
  if(friends.length===0){
    list.innerHTML=`<div class="empty-state">
      <i class="fas fa-address-book"></i>
      <p>通讯录为空<br>点击上方"添加朋友"</p>
    </div>`;
    return;
  }
  const sorted=[...friends].sort((a,b)=>{
    const ua=Store.findUser(a),ub=Store.findUser(b);
    return (ua?.nickname||'').localeCompare(ub?.nickname||'');
  });
  list.innerHTML=sorted.map(f=>{
    const u=Store.findUser(f);
    if(!u) return '';
    return `<div class="list-row" data-friend="${f}">
      ${userAvatarHTML(u,u.nickname)}
      <div class="info"><div class="name">${escapeHTML(u.nickname)}</div></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.list-row').forEach(row=>{
    row.onclick=()=>openChat(row.dataset.friend);
  });
}

  $('add-friend-hint').textContent='输入对方的用户名即可发送好友请求（Demo：将直接添加）。';
  $('add-friend-hint').style.color='';
  $('add-friend-modal').classList.add('show');
  setTimeout(()=>$('friend-username').focus(),100);
}
$('add-friend-card').onclick=openAddFriend;
$('add-friend-cancel').onclick=()=>$('add-friend-modal').classList.remove('show');
$('add-friend-confirm').onclick=()=>{
  const target=$('friend-username').value.trim();
  if(!target){$('add-friend-hint').textContent='请输入用户名';$('add-friend-hint').style.color='var(--danger)';return;}
  if(target===currentUser.username){
    $('add-friend-hint').textContent='不能添加自己为好友';$('add-friend-hint').style.color='var(--danger)';
    return;
  }
  const tu=Store.findUser(target);
  if(!tu){
    $('add-friend-hint').textContent='用户不存在';$('add-friend-hint').style.color='var(--danger)';
    return;
  }
  if(Store.isFriend(currentUser.username,target)){
    $('add-friend-hint').textContent='你们已经是好友了';$('add-friend-hint').style.color='var(--danger)';
    return;
  }
  Store.addFriend(currentUser.username,target);
  $('add-friend-modal').classList.remove('show');
  toast('已添加 '+tu.nickname+' 为好友');
  renderAll();
};

/* ============ 聊天详情 ============ */
function openChat(friendUsername){
  const u=Store.findUser(friendUsername);
  if(!u){toast('用户不存在');return;}
  currentChatTarget=friendUsername;
  $('chat-target-name').textContent=u.nickname;
  $('chat-detail-view').classList.add('show');
  $('chat-input').value='';
  autoResize($('chat-input'));
  // 清未读
  Store.clearUnread(currentUser.username,friendUsername);
  renderChatMessages();
  renderChatList();
  renderContacts();
}
$('chat-back').onclick=()=>{
  $('chat-detail-view').classList.remove('show');
  currentChatTarget=null;
  renderChatList();
  renderContacts();
};

function renderChatMessages(){
  if(!currentChatTarget||!currentUser) return;
  const msgs=Store.getMsgs(currentUser.username,currentChatTarget);
  const box=$('chat-messages');
  const targetUser=Store.findUser(currentChatTarget);
  if(!targetUser) return;

  let html='';
  let lastDate=null;
  msgs.forEach(m=>{
    const d=new Date(m.time);
    const dateKey=d.toDateString();
    if(dateKey!==lastDate){
      html+=`<div class="msg-time">${formatChatTime(m.time)}</div>`;
      lastDate=dateKey;
    }
    const isSelf=m.from===currentUser.username;
    const senderUser=Store.findUser(m.from);
    html+=`<div class="msg ${isSelf?'self':'other'}">
      ${userAvatarHTML(senderUser,senderUser?.nickname)}
      <div class="bubble">${escapeHTML(m.content)}</div>
    </div>`;
  });
  if(msgs.length===0){
    html=`<div class="msg-time">还没有消息，发条招呼吧 👋</div>`;
  }
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;

  // 进入聊天时检测对方是否有新消息发来（"接收"）
  // 这里 demo 简化：如果对方有未读，清掉（已经清了）
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}
$('chat-input').addEventListener('input',function(){autoResize(this);});
$('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
$('btn-send').onclick=sendMessage;

function sendMessage(){
  if(!currentChatTarget||!currentUser) return;
  const input=$('chat-input');
  const text=input.value.trim();
  if(!text) return;
  Store.addMsg(currentUser.username,currentChatTarget,text);
  // 如果对方当前没在和我们聊，给对方加未读
  // （demo：始终加，因为无法知道对方在线状态）
  Store.addUnread(currentChatTarget,currentUser.username);
  input.value='';
  autoResize(input);
  renderChatMessages();
  renderChatList();
}

/* ============ 工具 ============ */
function escapeHTML(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderAll(){
  renderChatList();
  renderContacts();
  renderProfile();
}

/* ============ 初始化 ============ */
refreshAuth();

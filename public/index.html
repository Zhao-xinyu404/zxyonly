<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>无聊 Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  :root{
    --brand:#07c160;
    --brand-dark:#06ad56;
    --brand-light:#e9f7ef;
    --bg:#ededed;
    --bg-2:#f7f7f7;
    --card:#ffffff;
    --text:#191919;
    --text-2:#888888;
    --text-3:#b2b2b2;
    --border:#e5e5e5;
    --line:#f0f0f0;
    --danger:#fa5151;
    --warn:#ffc300;
    --bubble-self:#95ec69;
    --shadow:0 8px 32px rgba(0,0,0,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:linear-gradient(135deg,#d8e4d8 0%,#e8eee8 50%,#d8e4d8 100%);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:0;
    overflow:hidden;
  }
  /* 手机外框 —— 桌面端居中显示 */
  .phone{
    position:relative;
    width:100%;
    max-width:430px;
    height:100vh;
    height:100dvh; /* 移动端动态视口，排除系统导航栏 */
    max-height:932px;
    background:var(--bg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,0.25), 0 0 0 8px #1a1a1a, 0 0 0 10px #2a2a2a;
    border-radius:42px;
  }
  /* 桌面端：当窗口高度不足以容纳手机外框时，去掉外壳限制，让内容撑满并保证底部 Tab 可见 */
  @media(min-width:481px) and (max-height:960px){
    .phone{
      max-height:100vh;
      max-height:100dvh;
      border-radius:0;
      box-shadow:none;
    }
    body{background:var(--bg);align-items:stretch;}
  }
  @media(max-width:480px){
    body{background:var(--bg);}
    .phone{
      box-shadow:none;
      border-radius:0;
      max-width:100%;
      max-height:100vh;
      max-height:100dvh;
    }
  }
  /* 滚动条隐藏 */
  .phone ::-webkit-scrollbar{width:0;display:none;}

  /* ===== 登录/注册页 ===== */
  #auth-view{
    flex:1;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,#ffffff 0%,#f3f7f3 100%);
    overflow-y:auto;
  }
  .auth-header{
    padding:60px 30px 30px;
    text-align:center;
  }
  .auth-logo{
    width:88px;height:88px;
    margin:0 auto 18px;
    background:linear-gradient(135deg,var(--brand) 0%,#34d27f 100%);
    border-radius:22px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 30px rgba(7,193,96,0.35);
    color:#fff;font-size:42px;
    transform:rotate(-6deg);
    transition:transform .6s cubic-bezier(.2,.8,.2,1);
  }
  .auth-logo:hover{transform:rotate(0deg) scale(1.05);}
  .auth-header h1{font-size:28px;letter-spacing:1px;margin-bottom:6px;}
  .auth-header p{color:var(--text-2);font-size:14px;}

  .auth-form{
    padding:20px 30px 40px;
    display:flex;flex-direction:column;gap:14px;
  }
  .field{
    position:relative;
    background:#fff;
    border-radius:14px;
    border:1.5px solid var(--border);
    transition:border-color .25s;
  }
  .field:focus-within{border-color:var(--brand);}
  .field label{
    position:absolute;
    left:16px;top:50%;
    transform:translateY(-50%);
    color:var(--text-3);
    font-size:13px;
    pointer-events:none;
    transition:all .2s;
  }
  .field input{
    width:100%;
    border:none;outline:none;
    background:transparent;
    padding:18px 16px 8px;
    font-size:16px;
    color:var(--text);
  }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label{
    top:8px;transform:translateY(0);
    font-size:11px;color:var(--brand);
  }
  .field.has-icon input{padding-left:48px;}
  .field .icon{
    position:absolute;left:18px;top:50%;transform:translateY(-50%);
    color:var(--text-3);font-size:16px;
  }

  .avatar-pick{
    display:flex;gap:10px;flex-wrap:wrap;
    padding:6px 0 4px;
  }
  .avatar-pick .av{
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;font-weight:600;
    cursor:pointer;
    border:3px solid transparent;
    transition:transform .2s, border-color .2s;
  }
  .avatar-pick .av:hover{transform:scale(1.08);}
  .avatar-pick .av.active{border-color:var(--brand);transform:scale(1.08);}

  .btn-primary{
    background:var(--brand);
    color:#fff;border:none;
    padding:16px;border-radius:14px;
    font-size:16px;font-weight:500;
    cursor:pointer;
    transition:background .2s, transform .1s;
    margin-top:6px;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-primary:disabled{background:#9ed8b6;cursor:not-allowed;}

  .auth-switch{
    text-align:center;
    color:var(--text-2);
    font-size:13px;
    margin-top:8px;
  }
  .auth-switch a{
    color:var(--brand);
    text-decoration:none;
    font-weight:500;
  }
  .auth-tip{
    margin-top:24px;
    padding:14px 16px;
    background:var(--brand-light);
    border-radius:12px;
    font-size:12px;
    color:var(--brand-dark);
    line-height:1.6;
  }
  .auth-error{
    color:var(--danger);
    font-size:12px;
    text-align:center;
    min-height:16px;
    margin-top:-4px;
  }

  /* ===== 主视图 ===== */
  #main-view{
    flex:1;
    display:none;
    flex-direction:column;
    overflow:hidden;
    background:var(--bg);
  }
  #main-view.show{display:flex;}

  /* 顶部 Header */
  .nav-header{
    flex-shrink:0;
    background:#ededed;
    padding:32px 16px 10px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  .nav-header h2{
    font-size:17px;font-weight:600;
    flex:1;text-align:center;
  }
  .nav-header .icon-btn{
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:20px;
    background:transparent;border:none;cursor:pointer;
    border-radius:8px;
    transition:background .2s;
  }
  .nav-header .icon-btn:hover{background:rgba(0,0,0,0.05);}

  /* Tab 内容区 */
  .tab-panels{
    flex:1;
    overflow-y:auto;
    position:relative;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* 通用列表 */
  .list-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;
    background:#fff;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    transition:background .15s;
  }
  .list-row:hover{background:#f5f5f5;}
  .list-row:active{background:#ebebeb;}
  .list-row .avatar{
    width:46px;height:46px;border-radius:8px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;font-weight:600;
    position:relative;
  }
  .list-row .info{flex:1;min-width:0;}
  .list-row .info .name{
    font-size:16px;font-weight:500;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .list-row .info .desc{
    font-size:13px;color:var(--text-2);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    margin-top:2px;
  }
  .list-row .meta{
    font-size:11px;color:var(--text-3);
    flex-shrink:0;
    text-align:right;
  }
  .badge{
    display:inline-block;
    background:var(--danger);color:#fff;
    font-size:11px;font-weight:600;
    min-width:18px;height:18px;
    border-radius:9px;
    padding:0 5px;
    line-height:18px;
    text-align:center;
    margin-top:4px;
  }

  /* 无聊 Tab */
  .chat-search{
    padding:8px 12px;
    background:#ededed;
    position:sticky;top:0;z-index:2;
  }
  .chat-search .box{
    background:rgba(255,255,255,0.9);
    border-radius:8px;
    padding:8px 12px;
    text-align:center;
    font-size:13px;color:var(--text-2);
  }
  .chat-list .list-row .info .desc{color:var(--text-2);}
  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-3);
  }
  .empty-state i{font-size:48px;margin-bottom:14px;color:var(--text-3);opacity:.5;}
  .empty-state p{font-size:14px;}

  /* 通讯录 Tab */
  .contacts-header-card{
    background:#fff;
    padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .contacts-header-card:hover{background:#f5f5f5;}
  .contacts-header-card .ic{
    width:36px;height:36px;border-radius:8px;
    background:var(--brand);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;
  }
  .contacts-section-title{
    background:#ededed;color:var(--text-2);
    padding:6px 16px;font-size:12px;
  }

  /* 发现 Tab */
  .discover-list .list-row .avatar{background:transparent;}
  .discover-list .list-row .avatar i{font-size:20px;}
  .discover-banner{
    background:linear-gradient(135deg,#07c160 0%,#34d27f 100%);
    color:#fff;
    padding:24px 18px;margin:12px;
    border-radius:14px;
    display:flex;align-items:center;gap:14px;
    box-shadow:0 8px 22px rgba(7,193,96,0.3);
  }
  .discover-banner i{font-size:32px;}
  .discover-banner div h4{font-size:16px;font-weight:600;}
  .discover-banner div p{font-size:12px;opacity:.85;margin-top:2px;}

  /* 我 Tab */
  .profile-card{
    background:#fff;
    padding:24px 16px;
    display:flex;align-items:center;gap:16px;
    border-bottom:1px solid var(--line);
  }
  .profile-card .avatar{
    width:64px;height:64px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:26px;font-weight:600;
  }
  .profile-card .info h3{font-size:19px;font-weight:600;}
  .profile-card .info .wxid{font-size:13px;color:var(--text-2);margin-top:4px;}
  .profile-card .info .bio{font-size:12px;color:var(--text-3);margin-top:6px;}
  .profile-card .qr{color:var(--text-3);font-size:18px;}

  .profile-menu{margin-top:10px;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .profile-menu .list-row .arrow{color:var(--text-3);font-size:14px;}
  .profile-menu .list-row .avatar{width:24px;height:24px;border-radius:6px;font-size:14px;}

  /* 底部 Tab Bar */
  .tab-bar{
    flex-shrink:0;
    background:#f7f7f7;
    border-top:1px solid var(--border);
    display:flex;
    padding:6px 0 14px;
  }
  .tab-bar .tab{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--text-2);font-size:11px;
    cursor:pointer;
    gap:3px;
    transition:color .2s;
  }
  .tab-bar .tab i{font-size:22px;}
  .tab-bar .tab.active{color:var(--brand);}

  /* ===== 聊天详情页 ===== */
  #chat-detail-view{
    position:absolute;
    inset:0;
    background:var(--bg);
    display:none;
    flex-direction:column;
    z-index:50;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  #chat-detail-view.show{
    display:flex;
    transform:translateX(0);
  }

  /* ===== 公众号详情页 ===== */
  #official-account-view{
    position:absolute;
    inset:0;
    background:var(--bg);
    display:none;
    flex-direction:column;
    z-index:50;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);
  }
  #official-account-view.show{
    display:flex;
    transform:translateX(0);
  }
  .oa-content{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .oa-header{
    background:#fff;
    padding:24px 16px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .oa-header .oa-avatar{
    width:72px;height:72px;
    border-radius:14px;
    margin:0 auto 12px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:32px;
  }
  .oa-header .oa-title{
    font-size:20px;font-weight:600;color:var(--text);
  }
  .oa-header .oa-desc{
    font-size:13px;color:var(--text-2);margin-top:6px;
  }
  .oa-header .oa-btn{
    display:inline-block;
    margin-top:14px;
    padding:8px 28px;
    background:var(--brand);
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
  }
  .oa-header .oa-btn.added{
    background:#f0f0f0;color:var(--text-2);
  }
  .oa-articles{
    margin-top:8px;
  }
  .oa-article{
    background:#fff;
    margin:8px 12px;
    padding:14px;
    border-radius:8px;
  }
  .oa-article .art-title{
    font-size:16px;font-weight:500;color:var(--text);
    margin-bottom:6px;
  }
  .oa-article .art-excerpt{
    font-size:13px;color:var(--text-2);line-height:1.6;
  }
  .oa-article .art-meta{
    font-size:11px;color:var(--text-3);margin-top:8px;
  }
  .chat-detail-header{
    flex-shrink:0;
    background:#ededed;
    padding:30px 8px 10px;
    display:flex;align-items:center;gap:6px;
    border-bottom:1px solid var(--border);
  }
  .chat-detail-header .icon-btn{
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:20px;background:none;border:none;cursor:pointer;
    border-radius:8px;
  }
  .chat-detail-header .icon-btn:hover{background:rgba(0,0,0,0.05);}
  .chat-detail-header h3{
    flex:1;text-align:center;font-size:17px;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;
  }

  .chat-messages{
    flex:1;
    overflow-y:auto;
    padding:14px 12px 20px;
    display:flex;flex-direction:column;gap:14px;
  }
  .msg-time{
    text-align:center;font-size:11px;color:var(--text-2);
    margin:8px 0;
  }
  .msg{
    display:flex;gap:8px;align-items:flex-start;
    max-width:100%;
    animation:msgIn .25s ease;
  }
  @keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .msg .avatar{
    width:38px;height:38px;border-radius:6px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:15px;font-weight:600;
  }
  .msg .bubble{
    max-width:64%;
    padding:10px 12px;
    border-radius:6px;
    font-size:15px;
    line-height:1.45;
    word-break:break-word;
    position:relative;
    box-shadow:0 1px 1px rgba(0,0,0,0.04);
  }
  .msg.other .bubble{background:#fff;color:var(--text);}
  .msg.other .bubble::before{
    content:"";position:absolute;left:-6px;top:12px;
    border:6px solid transparent;border-right-color:#fff;
  }
  .msg.self{flex-direction:row-reverse;}
  .msg.self .bubble{background:var(--bubble-self);color:var(--text);}
  .msg.self .bubble::before{
    content:"";position:absolute;right:-6px;top:12px;
    border:6px solid transparent;border-left-color:var(--bubble-self);
  }

  .chat-input-bar{
    flex-shrink:0;
    background:#f7f7f7;
    border-top:1px solid var(--border);
    padding:8px 10px 14px;
    display:flex;align-items:flex-end;gap:8px;
  }
  .chat-input-bar .icon-btn{
    width:34px;height:34px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    color:#444;font-size:22px;background:none;border:none;cursor:pointer;
  }
  .chat-input-bar textarea{
    flex:1;
    min-height:36px;max-height:100px;
    border:none;outline:none;
    border-radius:6px;
    padding:8px 10px;
    font-size:15px;
    font-family:inherit;
    resize:none;
    background:#fff;
    line-height:1.4;
  }
  .chat-input-bar .send-btn{
    background:var(--brand);color:#fff;
    border:none;
    padding:0 16px;height:36px;
    border-radius:6px;
    font-size:14px;font-weight:500;
    cursor:pointer;
    flex-shrink:0;
    transition:background .2s;
  }
  .chat-input-bar .send-btn:hover{background:var(--brand-dark);}
  .chat-input-bar .send-btn:disabled{background:#9ed8b6;}

  /* ===== 模态框 ===== */
  .modal-mask{
    position:absolute;inset:0;
    background:rgba(0,0,0,0.45);
    z-index:100;
    display:none;
    align-items:center;justify-content:center;
    animation:fadeIn .2s ease;
  }
  .modal-mask.show{display:flex;}
  .modal{
    width:80%;max-width:320px;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    animation:scaleIn .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
  .modal-header{
    padding:18px 18px 12px;text-align:center;
    font-size:16px;font-weight:600;
  }
  .modal-body{padding:0 18px 16px;}
  .modal-body input{
    width:100%;
    border:1.5px solid var(--border);border-radius:8px;
    padding:12px;font-size:15px;outline:none;
    transition:border-color .2s;
  }
  .modal-body input:focus{border-color:var(--brand);}
  .modal-body .hint{font-size:12px;color:var(--text-2);margin-top:8px;line-height:1.5;}
  .modal-footer{
    display:flex;border-top:1px solid var(--line);
  }
  .modal-footer button{
    flex:1;background:none;border:none;padding:14px 0;
    font-size:16px;cursor:pointer;
  }
  .modal-footer button:hover{background:#f5f5f5;}
  .modal-footer .confirm{color:var(--brand);font-weight:600;border-left:1px solid var(--line);}
  .modal-footer .confirm.danger{color:var(--danger);}

  /* Toast */
  .toast{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.78);
    color:#fff;
    padding:12px 20px;
    border-radius:10px;
    font-size:14px;
    z-index:200;
    pointer-events:none;
    opacity:0;
    transition:opacity .25s;
    max-width:80%;
    text-align:center;
  }
  .toast.show{opacity:1;}

  /* 预设头像颜色 */
  .av-1{background:linear-gradient(135deg,#07c160,#34d27f);}
  .av-2{background:linear-gradient(135deg,#3b82f6,#60a5fa);}
  .av-3{background:linear-gradient(135deg,#f59e0b,#fbbf24);}
  .av-4{background:linear-gradient(135deg,#ef4444,#f87171);}
  .av-5{background:linear-gradient(135deg,#8b5cf6,#a78bfa);}
  .av-6{background:linear-gradient(135deg,#ec4899,#f472b6);}
  .av-7{background:linear-gradient(135deg,#14b8a6,#5eead4);}
  .av-8{background:linear-gradient(135deg,#64748b,#94a3b8);}
</style>
</head>
<body>

<div class="phone">

  <!-- ============ 登录/注册 ============ -->
  <div id="auth-view">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-comment-dots"></i></div>
      <h1>无聊</h1>
      <p>无聊 · 即时通讯 简化版</p>
    </div>

    <div class="auth-form">
      <!-- 登录表单 -->
      <div id="login-form">
        <div class="field has-icon">
          <input type="text" id="login-username" placeholder=" " autocomplete="off">          <i class="icon fas fa-user"></i>
          <label>无聊号</label>
        </div>
        <div class="field has-icon">
          <input type="password" id="login-password" placeholder=" " autocomplete="off">
          <i class="icon fas fa-lock"></i>
          <label>密码</label>
        </div>

<script>
/* ============ 后端地址配置 ============ */
// 部署到 GitHub Pages 时，把这里改成你服务器的后端地址
// 例如：const API_BASE='https://your-server.com';
// 本地开发时留空，表示用当前域名
const API_BASE = 'https://wuliao-chat.onrender.com';

/* ============ API 调用 ============ */
async function api(url, data, method='POST'){
  const fullUrl = API_BASE + url;
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(data) opts.body = JSON.stringify(data);
  try{
    const res = await fetch(fullUrl, opts);
    return await res.json();
  }catch(e){
    return {success:false, msg:'网络错误，请检查后端服务是否启动'};
  }
}

/* ============ 头像渲染 ============ */
const AV_ICONS={1:'cat',2:'dog',3:'fish',4:'dragon',5:'otter',6:'kiwi-bird',7:'horse',8:'paw'};
function avatarHTML(av,text){
  const icon=AV_ICONS[av]||'paw';
  if(text){
    return `<div class="avatar av-${av||1}">${text.charAt(0).toUpperCase()}</div>`;
  }
  return `<div class="avatar av-${av||1}"><i class="fas fa-${icon}"></i></div>`;
}
function userAvatarHTML(user,text){
  if(!user) return avatarHTML(1,'?');
  const icon=AV_ICONS[user.avatar]||'paw';
  if(text){
    return `<div class="avatar av-${user.avatar||1}">${text.charAt(0).toUpperCase()}</div>`;
  }
  return `<div class="avatar av-${user.avatar||1}"><i class="fas fa-${icon}"></i></div>`;
}

/* ============ UI 辅助 ============ */
const $ = id => document.getElementById(id);
function toast(msg,duration=1800){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),duration);
}

let confirmCallback=null;
function showConfirm(msg,onOk,title='提示'){
  $('confirm-title').textContent=title;
  $('confirm-msg').textContent=msg;
  $('confirm-modal').classList.add('show');
  confirmCallback=onOk;
}
$('confirm-cancel').onclick=()=>$('confirm-modal').classList.remove('show');
$('confirm-ok').onclick=()=>{
  $('confirm-modal').classList.remove('show');
  if(confirmCallback){confirmCallback();confirmCallback=null;}
};

/* ============ 当前会话状态 ============ */
let currentUser=null;
let currentChatTarget=null;
let socket=null;
let unreadMap={};  // 未读消息计数（内存）

/* ============ 认证 ============ */
async function refreshAuth(){
  const u=localStorage.getItem('wuliao_session');
  if(u){
    const r=await api(`/api/user/${u}`,'','GET');
    if(r.success){
      currentUser=r.user;
      enterMain();
      return;
    }
  }
  showAuth();
}
function showAuth(){
  $('auth-view').style.display='flex';
  $('main-view').classList.remove('show');
  $('chat-detail-view').classList.remove('show');
}

$('goto-register').onclick=()=>{
  $('login-form').style.display='none';
  $('register-form').style.display='block';
  $('login-error').textContent='';
};
$('goto-login').onclick=()=>{
  $('register-form').style.display='none';
  $('login-form').style.display='block';
  $('reg-error').textContent='';
};

// 头像选择
let selectedAvatar=1;
document.querySelectorAll('#avatar-pick .av').forEach(el=>{
  el.onclick=()=>{
    document.querySelectorAll('#avatar-pick .av').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    selectedAvatar=parseInt(el.dataset.av);
  };
});

$('btn-login').onclick=async()=>{
  const username=$('login-username').value.trim();
  const password=$('login-password').value;
  if(!username||!password){$('login-error').textContent='请输入无聊号和密码';return;}
  const r=await api('/api/login',{username,password});
  if(!r.success){
    $('login-error').textContent=r.msg;
    return;
  }
  $('login-error').textContent='';
  localStorage.setItem('wuliao_session',r.user.username);
  currentUser=r.user;
  enterMain();
  toast('登录成功，欢迎回来！');
};

$('btn-register').onclick=async()=>{
  const username=$('reg-username').value.trim();
  const password=$('reg-password').value;
  const nickname=$('reg-nickname').value.trim();
  if(!username||!password||!nickname){
    $('reg-error').textContent='请填写完整信息';return;
  }
  const r=await api('/api/register',{username,password,nickname,avatar:selectedAvatar});
  if(!r.success){
    $('reg-error').textContent=r.msg;
    return;
  }
  $('reg-error').textContent='';
  localStorage.setItem('wuliao_session',r.user.username);
  currentUser=r.user;
  enterMain();
  toast('注册成功，欢迎加入无聊！');
};

function enterMain(){
  $('auth-view').style.display='none';
  $('main-view').classList.add('show');
  $('chat-detail-view').classList.remove('show');
  switchTab('chat');
  startPolling();
  renderAll();
}

/* ============ 轮询获取新消息 ============ */
let pollTimer=null;
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(()=>{
    if(currentUser&&currentChatTarget){
      api(`/api/messages/${currentUser.username}/${currentChatTarget}`,'','GET').then(res=>{
        if(res.success) renderChatMessages();
      });
    }
    if(currentUser){
      api(`/api/friends/${currentUser.username}`,'','GET').then(res=>{
        if(res.success) renderChatList();
      });
    }
  },2000);
}
function stopPolling(){
  if(pollTimer){
    clearInterval(pollTimer);
    pollTimer=null;
  }
}

$('btn-logout').onclick=()=>{
  showConfirm('确定退出登录吗？',()=>{
    stopPolling();
    localStorage.removeItem('wuliao_session');
    currentUser=null;
    currentChatTarget=null;
    $('login-username').value='';
    $('login-password').value='';
    showAuth();
    toast('已退出登录');
  });
};

/* ============ Tab 切换 ============ */
const TAB_TITLES={chat:'无聊',contacts:'通讯录',discover:'发现',profile:'我'};
function switchTab(name){
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
  $('nav-title').textContent=TAB_TITLES[name];
  if(name==='chat'){
    $('header-left').innerHTML='<i class="fas fa-plus"></i>';
    $('header-left').onclick=()=>openAddFriend();
    $('header-right').innerHTML='<i class="fas fa-search"></i>';
    $('header-right').onclick=()=>toast('搜索功能 敬请期待');
  } else if(name==='contacts'){
    $('header-left').innerHTML='<i class="fas fa-plus"></i>';
    $('header-left').onclick=()=>openAddFriend();
    $('header-right').innerHTML='';
    $('header-right').onclick=null;
  } else {
    $('header-left').innerHTML='';
    $('header-right').innerHTML='';
    $('header-left').onclick=null;
    $('header-right').onclick=null;
  }
  if(name==='chat') renderChatList();
  if(name==='contacts') renderContacts();
  if(name==='profile') renderProfile();
}
document.querySelectorAll('.tab-bar .tab').forEach(t=>{
  t.onclick=()=>switchTab(t.dataset.tab);
});

/* ============ 渲染：聊天列表 ============ */
async function renderChatList(){
  if(!currentUser) return;
  const list=$('chat-list');
  const r=await api(`/api/friends/${currentUser.username}`,'','GET');
  const friends=r.success?r.friends:[];
  if(friends.length===0){
    list.innerHTML=`<div class="empty-state">
      <i class="fas fa-comments"></i>
      <p>还没有会话<br>去通讯录添加好友开始聊天吧</p>
    </div>`;
    return;
  }
  const sessions=await Promise.all(friends.map(async f=>{
    const mr=await api(`/api/messages/${currentUser.username}/${f.username}`,'','GET');
    const msgs=mr.success?mr.messages:[];
    const last=msgs[msgs.length-1];
    return {
      username:f.username,
      user:f,
      lastMsg:last?last.content:'',
      lastTime:last?last.time:0,
      unread:unreadMap[f.username]||0
    };
  }));
  sessions.sort((a,b)=>b.lastTime-a.lastTime);
  list.innerHTML=sessions.map(s=>{
    if(!s.user) return '';
    const timeStr=s.lastTime?formatChatTime(s.lastTime):'';
    const unreadBadge=s.unread>0?`<span class="badge">${s.unread>99?'99+':s.unread}</span>`:'';
    return `<div class="list-row" data-friend="${s.username}">
      ${userAvatarHTML(s.user,s.user.nickname)}
      <div class="info">
        <div class="name">${escapeHTML(s.user.nickname)}</div>
        <div class="desc">${s.lastMsg?escapeHTML(s.lastMsg):'开始聊天吧 →'}</div>
      </div>
      <div class="meta">
        <div>${timeStr}</div>
        ${unreadBadge}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.list-row').forEach(row=>{
    row.onclick=()=>openChat(row.dataset.friend);
  });
}

function formatChatTime(t){
  const d=new Date(t);
  const now=new Date();
  if(d.toDateString()===now.toDateString()){
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  const yest=new Date(now);yest.setDate(now.getDate()-1);
  if(d.toDateString()===yest.toDateString()) return '昨天';
  return (d.getMonth()+1)+'/'+d.getDate();
}

/* ============ 渲染：通讯录 ============ */
async function renderContacts(){
  if(!currentUser) return;
  const list=$('contacts-list');
  const r=await api(`/api/friends/${currentUser.username}`,'','GET');
  const friends=r.success?r.friends:[];
  $('contacts-count').textContent='好友 ('+friends.length+')';
  if(friends.length===0){
    list.innerHTML=`<div class="empty-state">
      <i class="fas fa-address-book"></i>
      <p>通讯录为空<br>点击上方"添加朋友"</p>
    </div>`;
    return;
  }
  friends.sort((a,b)=>a.nickname.localeCompare(b.nickname));
  list.innerHTML=friends.map(f=>{
    return `<div class="list-row" data-friend="${f.username}">
      ${userAvatarHTML(f,f.nickname)}
      <div class="info"><div class="name">${escapeHTML(f.nickname)}</div></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.list-row').forEach(row=>{
    row.onclick=()=>openChat(row.dataset.friend);
  });
}

/* ============ 渲染：我 ============ */
function renderProfile(){
  const u=currentUser;
  if(!u) return;
  const av=$('profile-avatar');
  av.className='avatar av-'+(u.avatar||1);
  av.innerHTML=`<i class="fas fa-${AV_ICONS[u.avatar]||'paw'}"></i>`;
  $('profile-nickname').textContent=u.nickname;
  $('profile-username').textContent='无聊号：'+u.username;
  $('profile-bio').textContent=u.bio||'点击设置个性签名...';
  $('profile-bio').onclick=()=>{
    const bio=prompt('设置个性签名：',u.bio||'');
    if(bio!==null){
      currentUser.bio=bio.trim();
      renderProfile();
      toast('已更新');
    }
  };
}

/* ============ 添加好友 ============ */
function openAddFriend(){
  $('friend-username').value='';
  $('add-friend-hint').textContent='输入对方的用户名即可添加好友。';
  $('add-friend-hint').style.color='';
  $('add-friend-modal').classList.add('show');
  setTimeout(()=>$('friend-username').focus(),100);
}
$('add-friend-card').onclick=openAddFriend;
$('add-friend-cancel').onclick=()=>$('add-friend-modal').classList.remove('show');
$('add-friend-confirm').onclick=async()=>{
  const target=$('friend-username').value.trim();
  if(!target){$('add-friend-hint').textContent='请输入无聊号';$('add-friend-hint').style.color='var(--danger)';return;}
  if(target===currentUser.username){
    $('add-friend-hint').textContent='不能添加自己为好友';$('add-friend-hint').style.color='var(--danger)';
    return;
  }
  const r=await api('/api/add-friend',{from:currentUser.username,to:target});
  if(!r.success){
    $('add-friend-hint').textContent=r.msg;
    $('add-friend-hint').style.color='var(--danger)';
    return;
  }
  $('add-friend-modal').classList.remove('show');
  toast('已添加 '+r.target.nickname+' 为好友');
  renderAll();
  setTimeout(()=>openChat(target),500);
};

/* ============ 公众号 ============ */

const OA_ARTICLES=[
  {
    title:'欢迎关注无聊官方公众号',
    excerpt:'无聊是一款简洁的即时通讯应用，支持加好友、聊天等功能。在这里你可以查看最新公告和使用指南。',
    time:Date.now()-86400000
  },
  {
    title:'如何添加好友？',
    excerpt:'点击通讯录 → 添加朋友 → 输入对方的无聊号即可添加好友。添加成功后，好友会出现在通讯录和聊天列表中，点击即可开始聊天。',
    time:Date.now()-172800000
  },
  {
    title:'无聊使用小贴士',
    excerpt:'1. 在"我"页面可以设置个性签名\n2. 聊天列表按最近消息时间排序\n3. 支持多设备同时登录\n4. 消息实时同步，不用担心遗漏',
    time:Date.now()-259200000
  }
];

async function openOfficialAccount(){
  $('official-account-view').classList.add('show');
  await renderOfficialAccount();
}
$('official-account-card').onclick=openOfficialAccount;
$('oa-back').onclick=()=>$('official-account-view').classList.remove('show');

async function renderOfficialAccount(){
  if(!currentUser) return;
  const r=await api(`/api/user/${OFFICIAL_ACCOUNT}`,'','GET');
  const oa=r.success?r.user:null;
  const fr=await api(`/api/friends/${currentUser.username}`,'','GET');
  const friendUsernames=(fr.success?fr.friends:[]).map(f=>f.username);
  const isFriend=oa&&friendUsernames.includes(OFFICIAL_ACCOUNT);
  
  $('oa-name').textContent=oa?oa.nickname:'无聊官方';
  
  const avatarBg='#07c160';
  const articlesHtml=OA_ARTICLES.map(a=>{
    return `<div class="oa-article">
      <div class="art-title">${escapeHTML(a.title)}</div>
      <div class="art-excerpt">${escapeHTML(a.excerpt).replace(/\n/g,'<br>')}</div>
      <div class="art-meta">${formatChatTime(a.time)}</div>
    </div>`;
  }).join('');
  
  $('oa-content').innerHTML=`<div class="oa-header">
    <div class="oa-avatar" style="background:${avatarBg};"><i class="fas fa-bullhorn"></i></div>
    <div class="oa-title">${oa?escapeHTML(oa.nickname):'无聊官方'}</div>
    <div class="oa-desc">${oa&&oa.bio?escapeHTML(oa.bio):'无聊官方公众号 · 发布最新公告和使用指南'}</div>
    <button class="oa-btn ${isFriend?'added':''}" id="oa-follow-btn">${isFriend?'已关注':'关注公众号'}</button>
  </div>
  <div class="oa-articles">${articlesHtml}</div>`;
  
  const btn=$('oa-follow-btn');
  if(btn&&!isFriend){
    btn.onclick=async()=>{
      const r=await api('/api/add-friend',{from:currentUser.username,to:OFFICIAL_ACCOUNT});
      if(r.success){
        toast('已关注 '+r.target.nickname);
        renderOfficialAccount();
        renderAll();
      }else{
        toast(r.msg);
      }
    };
  }
}

/* ============ 聊天详情 ============ */
async function openChat(friendUsername){
  const r=await api(`/api/user/${friendUsername}`,'','GET');
  if(!r.success){toast('用户不存在');return;}
  currentChatTarget=friendUsername;
  $('chat-target-name').textContent=r.user.nickname;
  $('chat-detail-view').classList.add('show');
  $('chat-input').value='';
  autoResize($('chat-input'));
  delete unreadMap[friendUsername];
  renderChatMessages();
  renderChatList();
}
$('chat-back').onclick=()=>{
  $('chat-detail-view').classList.remove('show');
  currentChatTarget=null;
  renderChatList();
};

async function renderChatMessages(){
  if(!currentChatTarget||!currentUser) return;
  const r=await api(`/api/messages/${currentUser.username}/${currentChatTarget}`,'','GET');
  const msgs=r.success?r.messages:[];
  const box=$('chat-messages');
  const tr=await api(`/api/user/${currentChatTarget}`,'','GET');
  const targetUser=tr.success?tr.user:null;
  if(!targetUser) return;
  let html='';
  let lastDate=null;
  msgs.forEach(m=>{
    const d=new Date(m.time);
    const dateKey=d.toDateString();
    if(dateKey!==lastDate){
      html+=`<div class="msg-time">${formatChatTime(m.time)}</div>`;
      lastDate=dateKey;
    }
    const isSelf=m.from===currentUser.username;
    const senderUser=isSelf?currentUser:targetUser;
    html+=`<div class="msg ${isSelf?'self':'other'}">
      ${userAvatarHTML(senderUser,senderUser?.nickname)}
      <div class="bubble">${escapeHTML(m.content)}</div>
    </div>`;
  });
  if(msgs.length===0){
    html=`<div class="msg-time">还没有消息，发条招呼吧 👋</div>`;
  }
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}
$('chat-input').addEventListener('input',function(){autoResize(this);});
$('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
$('btn-send').onclick=sendMessage;

function sendMessage(){
  if(!currentChatTarget||!currentUser) return;
  const input=$('chat-input');
  const text=input.value.trim();
  if(!text) return;
  api('/api/messages/send',{from:currentUser.username,to:currentChatTarget,content:text},'POST').then(res=>{
    if(res.success){
      input.value='';
      autoResize(input);
      setTimeout(()=>{renderChatMessages();renderChatList();},200);
    }
  });
}

/* ============ 工具 ============ */
function escapeHTML(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderAll(){
  renderChatList();
  renderContacts();
  renderProfile();
}

/* ============ 初始化 ============ */
refreshAuth();
</script>
